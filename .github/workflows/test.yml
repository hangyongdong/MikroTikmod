name: Build WiFi-QCOM NPK (Test Only)

on:
  # 仅支持手动触发测试
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS 版本 (例如: 7.23)'
        required: true
        type: string
        default: '7.23'
      arch:
        description: '系统架构'
        required: true
        type: choice
        options:
          - arm64
          - x86
        default: 'arm64'

jobs:
  build-and-pack:
    name: 📦 编译测试 (${{ inputs.arch }} - ${{ inputs.version }})
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ inputs.version }}
      ARCH: ${{ inputs.arch }}
      # 如果你的 qcomp.py 需要调用私钥进行重签名，这些变量会从 Secrets 传递给 sudo -E
      CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
      CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装系统及 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip curl
          sudo pip3 install pefile pyelftools

      - name: ⬇️ 下载并提取官方 wifi-qcom 包
        run: |
          mkdir -p ./tmp_workspace ./output
          echo ">>> 下载官方全量包 (all_packages)..."
          curl -L -# -o "./tmp_workspace/all_packages-${ARCH}-${VERSION}.zip" "https://download.mikrotik.com/routeros/${VERSION}/all_packages-${ARCH}-${VERSION}.zip"
          
          echo ">>> 解压 wifi-qcom 模块..."
          unzip -q -o "./tmp_workspace/all_packages-${ARCH}-${VERSION}.zip" "wifi-qcom-${VERSION}-${ARCH}.npk" -d ./tmp_workspace/
          
          if [ ! -f "./tmp_workspace/wifi-qcom-${VERSION}-${ARCH}.npk" ]; then
              echo "❌ 错误: 未找到 wifi-qcom-${VERSION}-${ARCH}.npk"
              exit 1
          fi

      - name: ⚙️ 运行 qcomp.py 拆分与修补
        run: |
          WIFI_FILE="./tmp_workspace/wifi-qcom-${VERSION}-${ARCH}.npk"
          
          # 调用项目根目录下的 qcomp.py，并指定源文件夹 bdwlanX 和 bdwlanR
          sudo -E python3 qcomp.py \
              -i "$WIFI_FILE" \
              -b ./bdwlanX ./bdwlanR \
              -o "./output/wifi-qcom-${VERSION}-${ARCH}-X.npk" \
                 "./output/wifi-qcom-${VERSION}-${ARCH}-R.npk" \
              --max-vaps 32
          
          echo ">>> 生成的文件列表："
          ls -lh ./output/

      - name: 📤 提供下载链接 (上传到 Actions Artifacts)
        uses: actions/upload-artifact@v4
        with:
          # 下载压缩包的文件名
          name: wifi-qcom-patched-${{ inputs.version }}-${{ inputs.arch }}
          path: ./output/*.npk
          # 文件在 GitHub 服务器上保留的天数 (测试包无需久留)
          retention-days: 3
