name: Test Build x86 CHR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS CHR 版本 (例如: 7.23)'
        required: true
        type: string

jobs:
  build-test-x86:
    name: 🛠️ 编译测试 x86 CHR
    runs-on: ubuntu-latest
    
    env:
      VERSION: ${{ inputs.version }}
      ARCH: 'x86'
      MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
      MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
      CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
      CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
      CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
      CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
      MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL }}
      CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL }}
      MIKRO_CLOUD_URL: ${{ secrets.MIKRO_CLOUD_URL }}
      CUSTOM_CLOUD_URL: ${{ secrets.CUSTOM_CLOUD_URL }}
      MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY }}
      CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}          
      MIKRO_LICENCE_URL: ${{ secrets.MIKRO_LICENCE_URL }}
      CUSTOM_LICENCE_URL: ${{ secrets.CUSTOM_LICENCE_URL }}
      MIKRO_RENEW_URL: ${{ secrets.MIKRO_RENEW_URL }}
      CUSTOM_RENEW_URL: ${{ secrets.CUSTOM_RENEW_URL }}

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装底层依赖与环境
        run: |
          sudo apt-get update
          # 安装 qemu-utils 和 nbd 等挂载虚拟磁盘的核心工具
          sudo apt-get install -y zip unzip wget curl squashfs-tools python3-pip qemu-utils gdisk
          sudo pip3 install pefile pyelftools
          # 加载 NBD 内核模块 (GitHub Runner 必备)
          sudo modprobe nbd

      - name: 下载官方 CHR 原始镜像与系统包
        run: |
          echo ">>> 1. 正在下载 x86 系统主包..."
          # 智能探测：优先尝试下载带架构名的包，如果 404，则自动回退下载您提到的无架构名主包，并统一保存为标准命名
          if ! curl -L -f -# -o routeros-${VERSION}-${ARCH}.npk "https://download.mikrotik.com/routeros/${VERSION}/routeros-${VERSION}-${ARCH}.npk"; then
              echo ">>> 未找到带架构的主包，正在尝试拉取默认命名主包..."
              curl -L -f -# -o routeros-${VERSION}-${ARCH}.npk "https://download.mikrotik.com/routeros/${VERSION}/routeros-${VERSION}.npk"
          fi

          echo ">>> 2. 正在下载 Extra Packages (扩展包)..."
          curl -L -# -O "https://download.mikrotik.com/routeros/${VERSION}/all_packages-${ARCH}-${VERSION}.zip"
          sudo mkdir -p ./all_packages
          sudo unzip -q all_packages-${ARCH}-${VERSION}.zip -d ./all_packages/
          
          # 将下载好的主系统包移动到全量目录下，方便后面统一提取植入
          sudo mv routeros-${VERSION}-${ARCH}.npk ./all_packages/
          
          echo ">>> 3. 正在下载官方 chr.img.zip..."
          sudo wget -nv -O chr.img.zip "https://download.mikrotik.com/routeros/${VERSION}/chr-${VERSION}.img.zip"
          sudo unzip -q chr.img.zip
          sudo mv chr-${VERSION}.img chr.img

          echo ">>> 4.执行 Patch (routeros)..."
          sudo -E python3 patch.py npk ./all_packages/routeros-${VERSION}-${ARCH}.npk        
          
          echo ">>> 5.签名当前所有 NPK 文件..."          
          NPK_FILES=$(find ./all_packages -name "*.npk")
          for file in $NPK_FILES; do
          sudo -E python3 npk.py sign "$file" "$file"
          done

          echo ">>> 6. 打包option 与 mihomo (x86)..."
          sudo mkdir -p ./option-root/bin/
          sudo mkdir -p ./mihomo-root/bin/
          
          echo ">>> 正在克隆官方 mihomo 源码仓库.."
          git clone --depth 1 -b Alpha https://github.com/MetaCubeX/mihomo.git mihomo_src
          
          if [ ! -d "mihomo_src" ]; then
              echo "!!! 克隆仓库失败，请检查网络连接或仓库地址"
              exit 1
          fi

          echo ">>> 正在调用独立脚本 Patch 修改 constant/path.go ..."
          sudo python3 patch_mihomo_path.py ./mihomo_src/constant/path.go
          cd mihomo_src

          echo ">>> 正在注入 RouterOS NPK 专属 SSL 证书路径..."
          cat << 'EOF' > init_env.go
          package main

          import "os"

          func init() {
              // NPK 安装后会被挂载在 /pckg/mihomo/ 目录下
              os.Setenv("SSL_CERT_FILE", "/pckg/mihomo/certs/cacert.pem")
          }
          EOF

          # =========================================================
          # 🌟 核心修改 1：改变 Go 的目标架构为 386 (标准 x86 兼容模式)
          # 注: 若您确定只用于 64 位 CHR，此处 GOARCH 也可以写为 amd64
          # =========================================================
          GOOS=linux GOARCH=386 go build -ldflags "-s -w" -o ../mihomo_temp main.go init_env.go
          cd ..
          rm -rf mihomo_src          
          if [ ! -f "mihomo_temp" ]; then
              echo "!!! Go 编译失败，请检查上方编译日志"
              exit 1
          fi          
          sudo mv mihomo_temp ./mihomo-root/bin/mihomo
          sudo chmod +x ./mihomo-root/bin/mihomo          
          
          echo ">>> 正在打包系统根证书 (cacert.pem)..."
          sudo mkdir -p ./mihomo-root/certs
          sudo curl -sL "https://curl.se/ca/cacert.pem" -o ./mihomo-root/certs/cacert.pem
          
          echo ">>> Mihomo 编译与证书融合成功！"
          
          echo ">>> 正在制作option NPK..."
          # =========================================================
          # 🌟 核心修改 2：调用和复制 x86 版本的 busybox
          # =========================================================
          if [ -f "./busybox/busybox_x86" ]; then
              sudo chmod +x ./busybox/busybox_x86 
              sudo cp ./busybox/busybox_x86 ./option-root/bin/busybox
              sudo chmod +x ./option-root/bin/busybox
              
              # 直接用刚拷进去的 x86 版本生成命令列表
              COMMANDS=$(./busybox/busybox_x86 --list)
              for cmd in $COMMANDS; do
                  sudo ln -sf /pckg/option/bin/busybox ./option-root/bin/$cmd                  
              done             
          fi
          
          TEMPLATE_NPK=$(find ./all_packages -name "gps-*.npk" | head -n 1)
          if [ -z "$TEMPLATE_NPK" ]; then 
              TEMPLATE_NPK="routeros-${VERSION}-${ARCH}.npk"
          fi
          
          echo ">>> 生成 squashfs 镜像..."
          sudo mksquashfs option-root option.sfs -quiet -comp xz -no-xattrs -b 256k -all-root
          sudo mksquashfs mihomo-root mihomo.sfs -quiet -comp xz -no-xattrs -b 256k -all-root

          # =========================================================
          # 🌟 核心修改 3：修改 NPK 打包描述文本
          # =========================================================
          echo ">>> 打包 option NPK..."
          sudo -E python3 npk.py create "$TEMPLATE_NPK" "./all_packages/option-${VERSION}-${ARCH}.npk" option ./option.sfs -desc="Busybox for x86"

          echo ">>> 打包 [mihomo NPK] ..."
          sudo -E python3 npk.py create "$TEMPLATE_NPK" "./all_packages/mihomo-${VERSION}-${ARCH}.npk" mihomo ./mihomo.sfs -desc="Mihomo proxy core"

      - name: 挂载、劫持引导并重构 CHR 磁盘镜像
        run: |
          echo ">>> 开始重构 CHR 虚拟磁盘..."
          cp chr.img chr-${VERSION}-x86-legacy-bios.img
          
          # 挂载为本地虚拟块设备
          sudo qemu-nbd -c /dev/nbd1 -f raw chr-${VERSION}-x86-legacy-bios.img
          echo ">>> 正在 Patch UEFI 引导程序 (BOOTX64.EFI)..."
          if [ -f "patch.py" ]; then
              # 直接对块设备里的 EFI 文件下黑手，完全不需要格式化 boot 分区！
              sudo -E python3 patch.py block /dev/nbd1p1 EFI/BOOT/BOOTX64.EFI
          else
              echo "❌ 错误: 当前目录下未找到 patch.py！"
              exit 1
          fi
          
          echo ">>> 正在重建并格式化系统分区..."
          # 强制格式化系统分区并打上官方卷标
          sudo mkfs.ext4 -F -L "RouterOS" -m 0 /dev/nbd1p2
          
          echo ">>> 正在植入 RouterOS 系统主包..."
          sudo mkdir -p ./chr/routeros
          sudo mount /dev/nbd1p2 ./chr/routeros/
          sudo mkdir -p ./chr/routeros/{var/pdb/system,boot,rw/disk}
          
          # 狸猫换太子：将刚才下载的 routeros-xxx-x86.npk 强制塞入系统底层
          sudo cp ./all_packages/routeros-${VERSION}-${ARCH}.npk ./chr/routeros/var/pdb/system/image
          
          # 植入启动自定义脚本
          echo -e '#!/bin/sh\n# Executed before loader start\n' | sudo tee ./chr/routeros/rw/disk/rc.local
          
          # 卸载与清理
          sudo umount /dev/nbd1p2
          sudo qemu-nbd -d /dev/nbd1
          echo ">>> 镜像底层重构完成！"

      - name: 生成 OVF 配置与转换 OVA 封装
        run: |
          echo ">>> 转换镜像格式..."
          sudo qemu-img convert -f raw -O qcow2 chr-${VERSION}-x86-legacy-bios.img chr-${VERSION}-x86-legacy-bios.qcow2
          sudo qemu-img convert -f raw -O vmdk chr-${VERSION}-x86-legacy-bios.img chr-${VERSION}-x86-legacy-bios.vmdk
          
          echo ">>> 封装 VMware OVA..."
          sudo qemu-img convert -f raw -O vmdk -o subformat=streamOptimized chr-${VERSION}-x86-legacy-bios.img disk1.vmdk
          
          VMDK="disk1.vmdk"
          OVF="chr-${VERSION}-x86-legacy-bios.ovf"
          OVA="chr-${VERSION}-x86-legacy-bios.ova"
          
          FILE_SIZE=$(stat -c %s "$VMDK")
          VIRTUAL_SIZE=$(qemu-img info --output=json "$VMDK" | jq '.["virtual-size"]')
          CAPACITY_MB=$((VIRTUAL_SIZE / 1024 / 1024))
          
          echo ">>> 调用 Python 脚本生成 OVF..."
          cat << 'EOF' > build_ovf.py
          import sys
          import textwrap
          vmdk_name, file_size, capacity_mb, ovf_out = sys.argv[1:5]
          xml_content = f"""<?xml version="1.0" encoding="UTF-8"?>
          <Envelope xmlns="http://schemas.dmtf.org/ovf/envelope/1" xmlns:ovf="http://schemas.dmtf.org/ovf/envelope/1" xmlns:rasd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_ResourceAllocationSettingData" xmlns:vmw="http://www.vmware.com/schema/ovf" xmlns:vssd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_VirtualSystemSettingData" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" vmw:buildId="build-18663434">
            <References>
              <File ovf:href="{vmdk_name}" ovf:id="file1" ovf:size="{file_size}"/>
            </References>
            <DiskSection>
              <Info>Virtual disk information</Info>
              <Disk ovf:capacity="{capacity_mb}" ovf:capacityAllocationUnits="byte * 2^20" ovf:diskId="vmdisk1" ovf:fileRef="file1" ovf:format="http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized"/>
            </DiskSection>
            <NetworkSection>
              <Info>The list of logical networks</Info>
              <Network ovf:name="VM Network">
                <Description>The VM Network network</Description>
              </Network>
            </NetworkSection>
            <VirtualSystem ovf:id="vm">
              <Info>A virtual machine</Info>
              <Name>MikroTik_RouterOS_CHR</Name>
              <OperatingSystemSection ovf:id="100" vmw:osType="other3xLinux64Guest">
                <Info>The kind of installed guest operating system</Info>
              </OperatingSystemSection>
              <VirtualHardwareSection>
                <Info>Virtual hardware requirements</Info>
                <System>
                  <vssd:ElementName>Virtual Hardware Family</vssd:ElementName>
                  <vssd:InstanceID>0</vssd:InstanceID>
                  <vssd:VirtualSystemIdentifier>MikroTik_RouterOS_CHR</vssd:VirtualSystemIdentifier>
                  <vssd:VirtualSystemType>vmx-10</vssd:VirtualSystemType>
                </System>
                <Item>
                  <rasd:AllocationUnits>hertz * 10^6</rasd:AllocationUnits>
                  <rasd:Description>Number of Virtual CPUs</rasd:Description>
                  <rasd:ElementName>1 virtual CPU(s)</rasd:ElementName>
                  <rasd:InstanceID>1</rasd:InstanceID>
                  <rasd:ResourceType>3</rasd:ResourceType>
                  <rasd:VirtualQuantity>1</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:AllocationUnits>byte * 2^20</rasd:AllocationUnits>
                  <rasd:Description>Memory Size</rasd:Description>
                  <rasd:ElementName>1024MB of memory</rasd:ElementName>
                  <rasd:InstanceID>2</rasd:InstanceID>
                  <rasd:ResourceType>4</rasd:ResourceType>
                  <rasd:VirtualQuantity>1024</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:Address>0</rasd:Address>
                  <rasd:Description>IDE Controller</rasd:Description>
                  <rasd:ElementName>ideController0</rasd:ElementName>
                  <rasd:InstanceID>3</rasd:InstanceID>
                  <rasd:ResourceType>5</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:AddressOnParent>0</rasd:AddressOnParent>
                  <rasd:ElementName>disk0</rasd:ElementName>
                  <rasd:HostResource>ovf:/disk/vmdisk1</rasd:HostResource>
                  <rasd:InstanceID>4</rasd:InstanceID>
                  <rasd:Parent>3</rasd:Parent>
                  <rasd:ResourceType>17</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:AddressOnParent>1</rasd:AddressOnParent>
                  <rasd:AutomaticAllocation>true</rasd:AutomaticAllocation>
                  <rasd:Connection>VM Network</rasd:Connection>
                  <rasd:Description>VmxNet3 ethernet adapter</rasd:Description>
                  <rasd:ElementName>ethernet0</rasd:ElementName>
                  <rasd:InstanceID>5</rasd:InstanceID>
                  <rasd:ResourceSubType>VmxNet3</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                  <vmw:Config ovf:required="false" vmw:key="slotInfo.pciSlotNumber" vmw:value="160"/>
                  <vmw:Config ovf:required="false" vmw:key="connectable.allowGuestControl" vmw:value="true"/>
                </Item>
                <vmw:Config ovf:required="false" vmw:key="firmware" vmw:value="bios"/>
              </VirtualHardwareSection>
            </VirtualSystem>
          </Envelope>
          """
          with open(ovf_out, 'w', encoding='utf-8') as f:
              f.write(textwrap.dedent(xml_content).strip())
          EOF

          python3 build_ovf.py "$VMDK" "$FILE_SIZE" "$CAPACITY_MB" "$OVF"
          
          sudo tar -cvf "$OVA" "$OVF" "$VMDK"
          sudo rm $VMDK $OVF
          sudo zip $OVA.zip $OVA
          sudo rm $OVA
          cd ./all_packages
          sudo zip ../all_packages.zip *.npk >/dev/null

          echo ">>> 准备输出目录..."
          cd ..
          mkdir -p output_images
          sudo mv chr-${VERSION}-x86-legacy-bios.qcow2 output_images/
          sudo mv chr-${VERSION}-x86-legacy-bios.vmdk output_images/
          sudo mv $OVA.zip output_images/
          sudo mv all_packages.zip output_images/

      - name: 📤 上传到 GitHub Artifacts 供本地下载测试
        uses: actions/upload-artifact@v4
        with:
          name: chr-x86-test-images-${{ env.VERSION }}
          path: output_images/
          retention-days: 3  # 测试文件保留 3 天自动删除
