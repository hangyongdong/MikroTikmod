name: Auto MikroTik RouterOS V7 Release & Publisher

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS 版本 (例如: 7.21.3)'
        required: true
        type: string
      publish_to_vps:
        description: '是否同步发布到升级服务器'
        required: true
        type: boolean
        default: false
      channel:
        description: '更新频道'
        required: true
        type: choice
        options:
          - stable
          - long-term
          - testing
          - development
        default: 'stable'

permissions:
  contents: write

jobs:
  check-updates:
    name: 🔍 检查版本更新
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 对比版本并生成构建矩阵
        id: set-matrix
        env:
          CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              echo ">>> 检测到手动触发，使用指定的版本和频道..."
              PUB_VPS="${{ inputs.publish_to_vps }}"
              if [ "$PUB_VPS" == "true" ]; then IS_PUB="true"; else IS_PUB="false"; fi
              JSON_ARRAY=$(jq -n -c \
                --arg v "${{ inputs.version }}" \
                --arg c "${{ inputs.channel }}" \
                --argjson p "$IS_PUB" \
                '[{version: $v, channel: $c, publish_to_vps: $p}]')
              echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
              exit 0
          fi

          echo ">>> 开启自动巡检模式..."
          JSON_ARRAY="[]"
          
          for channel in stable long-term testing development; do
              echo ">>> 正在检查频道: $channel"
              
              # 🌟 修复 1：加上 -f 参数，遇 404 错误直接失败返回空，杜绝下载 HTML
              OFFICIAL_NEWEST=$(curl -sLf "https://upgrade.mikrotik.com/routeros/NEWESTa7.$channel" || echo "")
              OFFICIAL_VER=$(echo "$OFFICIAL_NEWEST" | awk '{print $1}')
              
              CUSTOM_NEWEST=$(curl -sLf "https://${CUSTOM_UPGRADE_URL}/NEWESTa7.$channel" || echo "")
              CUSTOM_VER=$(echo "$CUSTOM_NEWEST" | awk '{print $1}')
              
              # 🌟 修复 2：如果提取的版本号不是以数字开头（比如残留的 HTML 代码），强制清空
              if [[ ! "$OFFICIAL_VER" =~ ^[0-9] ]]; then OFFICIAL_VER=""; fi
              if [[ ! "$CUSTOM_VER" =~ ^[0-9] ]]; then CUSTOM_VER=""; fi
              
              if [ -n "$OFFICIAL_VER" ]; then
                  UPDATE=false
                  if [ -z "$CUSTOM_VER" ]; then
                      echo "  - 本地无有效记录，准备首次发布: $OFFICIAL_VER"
                      UPDATE=true
                  elif [ "$OFFICIAL_VER" != "$CUSTOM_VER" ]; then
                      # 精确处理: 在 beta, rc, alpha 前加上 ~ 符号，以符合 Debian 的严格版本排序规范
                      NORM_OFFICIAL=$(echo "$OFFICIAL_VER" | sed -E 's/(beta|rc|alpha)/~\1/g')
                      NORM_CUSTOM=$(echo "$CUSTOM_VER" | sed -E 's/(beta|rc|alpha)/~\1/g')
                      
                      # 使用 Ubuntu 底层的 dpkg 命令进行语义化比较
                      if dpkg --compare-versions "$NORM_OFFICIAL" gt "$NORM_CUSTOM"; then
                          echo "  - 发现新版本: $CUSTOM_VER -> $OFFICIAL_VER"
                          UPDATE=true
                      fi
                  fi
                  
                  if [ "$UPDATE" = true ]; then
                      JSON_ARRAY=$(echo "$JSON_ARRAY" | jq -c --arg v "$OFFICIAL_VER" --arg c "$channel" '. += [{"version": $v, "channel": $c, "publish_to_vps": true}]')
                  else
                      echo "  - 已是最新版 ($CUSTOM_VER)，跳过。"
                  fi
              else
                  echo "  - 官方该频道 ($channel) 未提供更新或抓取失败，跳过。"
              fi
          done
          
          echo ">>> 最终构建矩阵: $JSON_ARRAY"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  patch-and-pack:
    name: 📦 编译发布 (${{ matrix.build.channel }} - ${{ matrix.build.version }})
    needs: check-updates
    if: ${{ needs.check-updates.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.check-updates.outputs.matrix) }}
    
    env:
      VERSION: ${{ matrix.build.version }}
      CHANNEL: ${{ matrix.build.channel }}
      ARCH: 'arm64'
      MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
      MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
      CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
      CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
      CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
      CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
      MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL }}
      CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL }}
      MIKRO_CLOUD_URL: ${{ secrets.MIKRO_CLOUD_URL }}
      CUSTOM_CLOUD_URL: ${{ secrets.CUSTOM_CLOUD_URL }}
      MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY }}
      CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}          
      MIKRO_LICENCE_URL: ${{ secrets.MIKRO_LICENCE_URL }}
      CUSTOM_LICENCE_URL: ${{ secrets.CUSTOM_LICENCE_URL }}
      MIKRO_RENEW_URL: ${{ secrets.MIKRO_RENEW_URL }}
      CUSTOM_RENEW_URL: ${{ secrets.CUSTOM_RENEW_URL }}

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装基础依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget curl squashfs-tools python3-pip rsync
          sudo pip3 install pefile pyelftools

      - name: 下载、Patch主包
        run: |
          echo "1. 下载 RouterOS NPK..."
          curl -L -# -O "https://${{ secrets.MIKRO_DOWNLOAD_URL }}/routeros/${VERSION}/routeros-${VERSION}-${ARCH}.npk"

          echo "2. 执行 Patch (routeros)..."
          sudo -E python3 patch.py npk routeros-${VERSION}-${ARCH}.npk
          sudo mv routeros-${VERSION}-${ARCH}.npk routeros-${VERSION}-${ARCH}-patch.npk

      - name: 使用新公钥签名NPK 和打包option
        run: |
          echo "3. 下载All Packages..."
          curl -L -# -O "https://${{ secrets.MIKRO_DOWNLOAD_URL }}/routeros/$VERSION/all_packages-$ARCH-$VERSION.zip"

          echo "4. 创建目录并解压"
          sudo mkdir -p ./all_packages-${ARCH}
          sudo unzip -q all_packages-${ARCH}-${VERSION}.zip -d ./all_packages-${ARCH}/
          
          MAIN_NPK_IN_ZIP="./all_packages-${ARCH}/routeros-${VERSION}-${ARCH}.npk"
          if [ -f "$MAIN_NPK_IN_ZIP" ]; then
              sudo rm -f "$MAIN_NPK_IN_ZIP"
          fi

          echo "5. 签名当前所有 NPK 文件..."          
          NPK_FILES=$(find ./all_packages-${ARCH} -name "*.npk")
          for file in $NPK_FILES; do
              sudo -E python3 npk.py sign "$file" "$file"
          done

          echo "6. 处理npk替换..."
          WIFI_FILE="./all_packages-${ARCH}/wifi-qcom-${VERSION}-${ARCH}.npk"
          WIFIBE_FILE="./all_packages-${ARCH}/wifi-qcom-be-${VERSION}-${ARCH}.npk"
          WIRE_FILE="./all_packages-${ARCH}/wireless-${VERSION}-${ARCH}.npk"
          WIFI_FILE_X="./all_packages-${ARCH}/wifi-qcom-${VERSION}-${ARCH}-X.npk"
          WIFI_FILE_R="./all_packages-${ARCH}/wifi-qcom-${VERSION}-${ARCH}-R.npk"
          if [ -f "$WIFI_FILE" ]; then
              sudo -E python3 roswifi.py -i "$WIFI_FILE" -b ./bdwlanX ./bdwlanR -o "$WIFI_FILE_X" "$WIFI_FILE_R"
              sudo rm -f "$WIFI_FILE"
              sudo rm -f "$WIRE_FILE"
              sudo rm -f "$WIFIBE_FILE"
          fi

          NETINSTALL_NPK="./all_packages-${ARCH}/netinstall-${VERSION}-${ARCH}.npk"
          if [ -f "$NETINSTALL_NPK" ]; then
              echo ">>> [发现 netinstall.npk] 正在准备替换其中的二进制文件..."
              
              # 确保您代码仓库中的 netinstall/netinstall 文件确实存在
              if [ -f "./netinstall/netinstall" ]; then
                  # 1. 赋予仓库内 netinstall 二进制文件执行权限
                  sudo chmod +x ./netinstall/netinstall
                  
                  # 2. 调用升级后的 roswifi.py 将其替换入 NPK 的 /nova/bin/ 目录下
                  # --src ./netinstall：将该文件夹下的所有文件（即编译好的 netinstall 补丁）拷入
                  # -o 同名路径：直接对原 NPK 文件进行原地覆盖修改与重签名
                  sudo -E python3 roswifi.py \
                    -i "$NETINSTALL_NPK" \
                    --src ./netinstall \
                    -o "$NETINSTALL_NPK" \
                    --target nova/bin
                    
                  echo ">>> 成功完成 netinstall.npk 的底层补丁替换与重签名！"
              else
                  echo "❌ 错误: 代码仓库中未找到 './netinstall/netinstall' 文件，跳过替换！"
                  exit 1
              fi
          else
              echo ">>> 本次打包中未发现 netinstall.npk (此包通常仅在特定架构或全量包中存在)，跳过处理。"
          fi

          echo "7. 打包option 与 mihomo (arm64)..."
          sudo mkdir -p ./option-root/bin/
          sudo mkdir -p ./mihomo-root/bin/
          
          echo ">>> 正在克隆官方 mihomo 源码仓库.."
          git clone --depth 1 -b Alpha https://github.com/MetaCubeX/mihomo.git mihomo_src
          
          if [ ! -d "mihomo_src" ]; then
              echo "!!! 克隆仓库失败，请检查网络连接或仓库地址"
              exit 1
          fi

          echo ">>> 正在调用独立脚本 Patch 修改 constant/path.go ..."
          sudo python3 patch_mihomo_path.py ./mihomo_src/constant/path.go
          cd mihomo_src


          echo ">>> 正在注入 RouterOS NPK 专属 SSL 证书路径..."
          cat << 'EOF' > init_env.go
          package main

          import "os"

          func init() {
              // NPK 安装后会被挂载在 /pckg/mihomo/ 目录下
              os.Setenv("SSL_CERT_FILE", "/pckg/mihomo/certs/cacert.pem")
          }
          EOF

          # 带着 init_env.go 一起编译
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o ../mihomo_temp main.go init_env.go
          cd ..
          rm -rf mihomo_src          
          if [ ! -f "mihomo_temp" ]; then
              echo "!!! Go 编译失败，请检查上方编译日志"
              exit 1
          fi          
          sudo mv mihomo_temp ./mihomo-root/bin/mihomo
          sudo chmod +x ./mihomo-root/bin/mihomo          
          

          echo ">>> 正在打包系统根证书 (cacert.pem)..."
          sudo mkdir -p ./mihomo-root/certs
          sudo curl -sL "https://curl.se/ca/cacert.pem" -o ./mihomo-root/certs/cacert.pem
          
          echo ">>> Mihomo 编译与证书融合成功！"
          
          echo ">>> 正在制作option NPK..."
          if [ -f "./busybox/busybox_aarch64" ]; then
              sudo cp ./busybox/busybox_aarch64 ./option-root/bin/busybox
              sudo chmod +x ./option-root/bin/busybox
              sudo chmod +x ./busybox/busybox_x86
              COMMANDS=$(./busybox/busybox_x86 --list)
              for cmd in $COMMANDS; do
                  sudo ln -sf /pckg/option/bin/busybox ./option-root/bin/$cmd                  
              done             
          fi
          
          TEMPLATE_NPK=$(find ./all_packages-${ARCH} -name "gps-*.npk" | head -n 1)
          if [ -z "$TEMPLATE_NPK" ]; then 
              TEMPLATE_NPK="routeros-${VERSION}-${ARCH}-patch.npk"
          fi
          
          echo ">>> 生成 squashfs 镜像..."
          sudo mksquashfs option-root option.sfs -quiet -comp xz -no-xattrs -b 256k -all-root
          sudo mksquashfs mihomo-root mihomo.sfs -quiet -comp xz -no-xattrs -b 256k -all-root

          echo ">>> 打包 option NPK..."
          sudo -E python3 npk.py create "$TEMPLATE_NPK" "./all_packages-${ARCH}/option-${VERSION}-${ARCH}.npk" option ./option.sfs -desc="Busybox for arm64"

          echo ">>> 打包 [mihomo NPK] ..."
          sudo -E python3 npk.py create "$TEMPLATE_NPK" "./all_packages-${ARCH}/mihomo-${VERSION}-${ARCH}.npk" mihomo ./mihomo.sfs -desc="Mihomo proxy core"

          echo "8. 重新生成全量压缩包..."
          cd ./all_packages-${ARCH}
          sudo zip ../all_packages-${ARCH}-${VERSION}-patched.zip *.npk >/dev/null
          cd ..
          
          echo "9. 获取 CHANGELOG..."
          curl -sL "https://${{ secrets.MIKRO_DOWNLOAD_URL }}/routeros/${VERSION}/CHANGELOG" > changelog.txt

      - name: 下载并 Patch Netinstall 工具
        run: |
          echo "10. 下载官方 Netinstall 工具..."
          sudo wget -nv -O netinstall.zip "https://${{ secrets.MIKRO_DOWNLOAD_URL }}/routeros/${VERSION}/netinstall-${VERSION}.zip"

          echo "11. Patch Windows 版本 (netinstall.exe)..."
          sudo unzip -q netinstall.zip
          if [ ! -f "./netinstall.exe" ]; then
              echo "错误: 未找到 netinstall.exe，解压可能失败！"
              exit 1
          fi
          sudo -E python3 patch.py netinstall netinstall.exe
          sudo zip -q netinstall-${VERSION}.zip ./netinstall.exe
          sudo rm -f ./netinstall.exe ./netinstall.zip 

      - name: 生成配置文件并发布到 VPS
        if: ${{ matrix.build.publish_to_vps == true }}
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          WEB_DIR: ${{ secrets.VPS_WEB_DIR }}
        run: |
          echo ">>> 准备 VPS 部署环境..."
          mkdir -p ./vps_upload/${VERSION}
          mkdir -p ./vps_upload/extra/${VERSION}
          
          cp ./all_packages-${ARCH}/*.npk ./vps_upload/${VERSION}/
          cp changelog.txt ./vps_upload/${VERSION}/CHANGELOG
          cp routeros-${VERSION}-${ARCH}-patch.npk ./vps_upload/${VERSION}/routeros-${VERSION}-${ARCH}.npk
          
          if [ -f "netinstall-${VERSION}.zip" ]; then
              cp netinstall-${VERSION}.zip ./vps_upload/extra/${VERSION}/
          fi
          
          cd ./vps_upload/${VERSION}
          if [ -f "wifi-qcom-${VERSION}-${ARCH}-R.npk" ]; then
              mv wifi-qcom-${VERSION}-${ARCH}-R.npk ../extra/${VERSION}/
              echo ">>> 已将 wifi-qcom R 版本安全隔离至 extra 目录。"
          fi
          if [ -f "wifi-qcom-${VERSION}-${ARCH}-X.npk" ]; then
              mv wifi-qcom-${VERSION}-${ARCH}-X.npk wifi-qcom-${VERSION}-${ARCH}.npk
              echo ">>> 已将 wifi-qcom X 版本格式化为标准名称。"
          fi
          
          echo ">>> 正在生成 packages.csv..."
          echo "arch,name,size" > packages.csv
          for file in *.npk; do
              base=$(basename "$file" .npk)
              [[ "$base" == routeros-* ]] && continue
              name="${base%%-${VERSION}-*}"
              arch="${base##*-${VERSION}-}"
              if [[ "$name" != "$base" && "$arch" != "$base" ]]; then
                  size=$(stat -c%s "$file")
                  echo "$arch,$name,$size" >> packages.csv
              fi
          done
          cd ../../
          
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts

          echo ">>> 正在通过 SSH 对比 VPS 硬盘上的历史版本号..."
          REMOTE_NEWEST=$(ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cat $WEB_DIR/NEWESTa7.${CHANNEL} 2>/dev/null" || echo "")
          REMOTE_VERSION=$(echo "$REMOTE_NEWEST" | awk '{print $1}')
          
          UPDATE_NEWEST=false
          if [ -z "$REMOTE_VERSION" ]; then
              UPDATE_NEWEST=true
          elif [ "$VERSION" == "$REMOTE_VERSION" ]; then
              echo ">>> 版本相同，跳过 NEWEST 更新。"
          else
              NORM_REMOTE=$(echo "$REMOTE_VERSION" | sed -E 's/(beta|rc|alpha)/~\1/g')
              NORM_LOCAL=$(echo "$VERSION" | sed -E 's/(beta|rc|alpha)/~\1/g')
              if dpkg --compare-versions "$NORM_LOCAL" gt "$NORM_REMOTE"; then
                  UPDATE_NEWEST=true
              fi
          fi

          if [ "$UPDATE_NEWEST" == "true" ]; then
              BUILD_TIME=$(date +%s)
              echo "${VERSION} ${BUILD_TIME}" > ./vps_upload/NEWESTa7.${CHANNEL}
          fi
          
          echo ">>> 正在更新多频道数据库并执行历史版本清理策略..."
          scp -P $SSH_PORT $SSH_USER@$SSH_HOST:$WEB_DIR/versions.json ./old_versions.json 2>/dev/null || echo "{}" > ./old_versions.json
          export REMOTE_DIRS=$(ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "cd $WEB_DIR && find . -maxdepth 1 -type d -name '7.*' | sed 's|./||'" || echo "")
          
          cat << 'EOF' > update_json.py
          import json, subprocess, re, sys, os
          version_to_add = sys.argv[1]
          channel_to_add = sys.argv[2]
          db = {"stable": [], "long-term": [], "testing": [], "development": []}
          
          try:
              with open('./old_versions.json', 'r') as f:
                  data = json.load(f)
              if isinstance(data, dict):
                  for k in db.keys(): db[k] = data.get(k, [])
          except Exception: pass
          
          remote_dirs = os.environ.get("REMOTE_DIRS", "").split()
          for v in remote_dirs:
              v = v.strip()
              if not v: continue
              if not any(v in db[c] for c in db.keys()):
                  if "rc" in v: db["testing"].append(v)
                  elif "beta" in v or "alpha" in v: db["development"].append(v)
                  elif v in ["7.20.8", "7.21.4"]: db["long-term"].append(v)
                  else: db["stable"].append(v)
                  
          for k in db.keys():
              if version_to_add in db[k]: db[k].remove(version_to_add)
          db[channel_to_add].append(version_to_add)

          def sort_versions(v_list):
              if not v_list: return []
              v_list = list(set(v_list))
              norm_map = {re.sub(r'(beta|rc|alpha)', r'~\1', v): v for v in v_list}
              p = subprocess.run(['sort', '-V', '-r'], input='\n'.join(norm_map.keys()), text=True, capture_output=True)
              return [norm_map[n] for n in p.stdout.strip().split('\n') if n in norm_map]

          for k in db.keys(): db[k] = sort_versions(db[k])

          # 1. Testing 和 Development: 只保留最新 1 个版本
          db["testing"] = db["testing"][:1]
          db["development"] = db["development"][:1]

          # 2. Stable: 保留最近两个大版本 (提取 7.x 前缀进行排序)
          if db["stable"]:
              majors = set()
              for v in db["stable"]:
                  m = re.match(r'^(\d+\.\d+)', v) # 提取 7.23, 7.22 这样的前缀
                  if m: majors.add(m.group(1))
              
              sorted_majors = sort_versions(list(majors))
              allowed_majors = sorted_majors[:2] # 只保留前两大的前缀
              
              new_stable = []
              for v in db["stable"]:
                  m = re.match(r'^(\d+\.\d+)', v)
                  if m and m.group(1) in allowed_majors:
                      new_stable.append(v)
              db["stable"] = new_stable
          
          # 3. Long-term: 不做任何处理，全量保留

          with open('./versions.json', 'w') as f: json.dump(db, f, indent=2)


          keep_set = set(db["stable"] + db["long-term"] + db["testing"] + db["development"])
          keep_set.add(version_to_add) # 强制保护当前编译版本
          
          to_delete = [v for v in remote_dirs if v.strip() and v.strip() not in keep_set]
          
          with open('./delete_list.txt', 'w') as f:
              f.write('\n'.join(to_delete))
          EOF

          python3 update_json.py "${VERSION}" "${CHANNEL}"

          echo ">>> 开始清理 VPS 过期历史版本空间..."
          if [ -s ./delete_list.txt ]; then
              while IFS= read -r del_ver; do
                  if [ -n "$del_ver" ]; then
                      echo "  - 正在粉碎过期版本: $del_ver"
                      # 同时删除主目录和 extra 扩展目录
                      ssh -p $SSH_PORT $SSH_USER@$SSH_HOST "rm -rf $WEB_DIR/$del_ver $WEB_DIR/extra/$del_ver"
                  fi
              done < ./delete_list.txt
          else
              echo "  - 暂无需要清理的过期版本。"
          fi

          echo ">>> 正在通过 Rsync 将固件推送到 VPS..."
          rsync -avz --progress -e "ssh -p $SSH_PORT" ./vps_upload/${VERSION} $SSH_USER@$SSH_HOST:$WEB_DIR/
          rsync -avz --progress -e "ssh -p $SSH_PORT" ./vps_upload/extra $SSH_USER@$SSH_HOST:$WEB_DIR/
          
          if [ -f "./vps_upload/NEWESTa7.${CHANNEL}" ]; then
              rsync -avz --progress -e "ssh -p $SSH_PORT" ./vps_upload/NEWESTa7.${CHANNEL} $SSH_USER@$SSH_HOST:$WEB_DIR/
          fi
          
          rsync -avz --progress -e "ssh -p $SSH_PORT" ./versions.json ./index.html $SSH_USER@$SSH_HOST:$WEB_DIR/

      - name: 清理临时文件
        run: |
          sudo rm -rf ./all_packages-${ARCH}
          sudo rm all_packages-${ARCH}-${VERSION}.zip

      - name: 自动发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-${{ env.CHANNEL }}-${{ env.ARCH }}
          name: RouterOS v${{ env.VERSION }} Patched (${{ env.CHANNEL }} - ${{ env.ARCH }})
          body_path: changelog.txt 
          files: |
            routeros-${{ env.VERSION }}-${{ env.ARCH }}-patch.npk
            all_packages-${{ env.ARCH }}-${{ env.VERSION }}-patched.zip
            netinstall-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
